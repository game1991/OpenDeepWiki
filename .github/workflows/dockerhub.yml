name: Docker Hub Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Debug
      run: ls -la src/opendeepwiki-source/src/OpenDeepWiki/
    
    - uses: docker/login-action@v3
      with:
        username: ${DOCKER_HUB_USERNAME}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
    
    - uses: docker/build-push-action@v5
      with:
        context: .
        file: ./src/opendeepwiki-source/src/OpenDeepWiki/Dockerfile
        push: true
        tags: ${DOCKER_HUB_USERNAME}/opendeepwiki-backend-fixed:latest
