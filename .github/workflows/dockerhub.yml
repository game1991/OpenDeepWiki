name: Docker Hub Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Debug
      run: ls -la src/opendeepwiki-source/src/EFCore/OpenDeepWiki.Postgresql/
    
    - uses: docker/login-action@v3
      with:
        username: luckystar520
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    
    - uses: docker/build-push-action@v5
      with:
        context: ./src/opendeepwiki-source
        file: ./src/opendeepwiki-source/src/OpenDeepWiki/Dockerfile
        push: true
        tags: luckystar520/opendeepwiki-backend-fixed:latest
