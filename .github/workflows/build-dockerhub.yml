name: Build and Push to Docker Hub

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本标签'
        required: false
        default: 'latest'

env:
  DOCKER_HUB_USERNAME: luckystar520
  BACKEND_IMAGE: opendeepwiki-backend
  FRONTEND_IMAGE: opendeepwiki-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Extract metadata
      id: meta
      env:
        EVENT_NAME: ${{ github.event_name }}
        INPUT_VERSION: ${{ github.event.inputs.version }}
        REF_TYPE: ${{ github.ref_type }}
        GITHUB_REF: ${{ github.ref }}
      run: |
        if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
          VERSION="$INPUT_VERSION"
        elif [ "$REF_TYPE" = "tag" ]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=latest
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag_date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./src/OpenDeepWiki/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ env.DOCKER_HUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
          ${{ env.DOCKER_HUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.tag_date }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./web
        file: ./web/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ env.DOCKER_HUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          ${{ env.DOCKER_HUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.tag_date }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Output summary
      env:
        VERSION: ${{ steps.meta.outputs.version }}
      run: |
        echo "## 构建完成 :rocket:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 镜像信息" >> $GITHUB_STEP_SUMMARY
        echo "| 组件 | 镜像 |" >> $GITHUB_STEP_SUMMARY
        echo "|------|------|" >> $GITHUB_STEP_SUMMARY
        echo "| Backend | \`docker.io/${{ env.DOCKER_HUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:$VERSION\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend | \`docker.io/${{ env.DOCKER_HUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:$VERSION\` |" >> $GITHUB_STEP_SUMMARY
