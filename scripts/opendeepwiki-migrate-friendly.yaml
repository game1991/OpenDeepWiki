# ==========================================
# OpenDeepWiki 迁移友好部署配置
# 适用于 Minikube 单节点，便于后续迁移
# ==========================================

# 后端配置
backend:
  replicaCount: 1  # 单节点用1个副本，方便迁移

  image:
    repository: crpi-j9ha7sxwhatgtvj4.cn-shenzhen.personal.cr.aliyuncs.com/open-deepwiki/opendeepwiki
    tag: latest
    pullPolicy: IfNotPresent

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"  # Minikube 环境降低内存限制
      cpu: "1000m"

  # 持久化存储（知识库文件和 SQLite 数据库）
  persistence:
    enabled: true
    storageClass: "standard"  # Minikube 自带的 StorageClass
    size: 50Gi
    accessMode: ReadWriteOnce

  # 环境变量配置
  environment:
    ASPNETCORE_ENVIRONMENT: Production
    URLS: http://+:8080
    # 使用 SQLite（单文件，易备份迁移）
    Database__Type: sqlite
    ConnectionStrings__Default: Data Source=/data/opendeepwiki.db
    REPOSITORIES_DIRECTORY: /data
    # AI 配置
    ENDPOINT: https://api.openai.com/v1
    CHAT_REQUEST_TYPE: OpenAI
    WIKI_CATALOG_MODEL: gpt-4o-mini  # Minikube 环境使用轻量级模型
    WIKI_CATALOG_ENDPOINT: https://api.openai.com/v1
    WIKI_CATALOG_REQUEST_TYPE: OpenAI
    WIKI_CONTENT_MODEL: gpt-4o
    WIKI_CONTENT_ENDPOINT: https://api.openai.com/v1
    WIKI_CONTENT_REQUEST_TYPE: OpenAI
    WIKI_PARALLEL_COUNT: "3"  # Minikube 资源有限，降低并发
    WIKI_LANGUAGES: "en,zh"

  # 敏感信息从 Secret 读取
  secrets:
    - name: CHAT_API_KEY
      secretName: opendeepwiki-secrets
      key: chat-api-key
    - name: WIKI_CATALOG_API_KEY
      secretName: opendeepwiki-secrets
      key: catalog-api-key
    - name: WIKI_CONTENT_API_KEY
      secretName: opendeepwiki-secrets
      key: content-api-key
    - name: JWT_SECRET_KEY
      secretName: opendeepwiki-secrets
      key: jwt-secret

  # Pod 安全上下文
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000

# 前端配置
frontend:
  replicaCount: 1

  image:
    repository: crpi-j9ha7sxwhatgtvj4.cn-shenzhen.personal.cr.aliyuncs.com/open-deepwiki/opendeepwiki-web
    tag: latest
    pullPolicy: IfNotPresent

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

  environment:
    NODE_ENV: production
    API_PROXY_URL: http://opendeepwiki-backend:8080

# 关闭 MySQL，使用 SQLite（单文件易备份）
mysql:
  enabled: false

# 关闭 PostgreSQL
postgresql:
  enabled: false

# 服务配置
service:
  backend:
    type: ClusterIP
    port: 8080
  frontend:
    type: ClusterIP
    port: 3000

# Ingress 配置（Minikube 环境简化）
ingress:
  enabled: false  # Minikube 先用 port-forward，生产环境再开启

# 自动扩缩容（单节点关闭）
autoscaling:
  enabled: false

# Pod Disruption Budget（单节点关闭）
pdb:
  enabled: false

# 服务账号
serviceAccount:
  create: true
