# 网关 Pod - 赛博科技风格首页
# nginx:alpine 默认配置 root=/usr/share/nginx/html，直接挂载 HTML 即可
---
apiVersion: v1
kind: Pod
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    ports:
    - containerPort: 80
    volumeMounts:
    - name: html
      mountPath: /usr/share/nginx/html
  volumes:
  - name: html
    configMap:
      name: gateway-html