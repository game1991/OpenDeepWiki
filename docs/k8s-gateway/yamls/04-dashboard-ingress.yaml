# Dashboard Ingress 路由（HTTPS）
# 域名：local.dashboard.com
# 端口：8443（Kind extraPortMappings 映射）
#
# 关键 annotations 说明：
# - backend-protocol: HTTPS    → 后端 Dashboard 使用 HTTPS
# - ssl-redirect: true        → HTTP 请求自动重定向到 HTTPS
# - proxy-ssl-verify: off     → 跳过自签名证书验证
# - proxy-ssl-protocols        → 指定 TLS 版本
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-ingress
  namespace: kubernetes-dashboard
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    nginx.ingress.kubernetes.io/proxy-ssl-protocols: "TLSv1.2 TLSv1.3"
spec:
  ingressClassName: nginx
  rules:
  - host: local.dashboard.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kubernetes-dashboard
            port:
              number: 443