# Kind 集群配置（NAT 网络模式）
# 关键配置说明：
# - apiServerAddress: 0.0.0.0  → 允许外部（Windows）访问 API Server
# - extraPortMappings   → 将容器端口映射到 WSL2 所有接口
# - listenAddress: 0.0.0.0  → NAT 模式下必须，否则 Windows 无法访问
# - imagePullPolicy: Never  → 配合预下载镜像使用
---
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-nat
nodes:
- role: control-plane
  image: kindest/node:v1.27.3
  labels:
    ingress-ready: "true"
  extraPortMappings:
  # HTTP 统一入口 → Ingress Controller
  - containerPort: 80
    hostPort: 8880
    listenAddress: "0.0.0.0"
    protocol: TCP
  # HTTPS 统一入口 → Ingress Controller
  - containerPort: 443
    hostPort: 8443
    listenAddress: "0.0.0.0"
    protocol: TCP