{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "opendeepwiki.fullname" . }}-backend
  labels:
    {{- include "opendeepwiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  minAvailable: {{ .Values.pdb.backend.minAvailable }}
  selector:
    matchLabels:
      {{- include "opendeepwiki.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "opendeepwiki.fullname" . }}-frontend
  labels:
    {{- include "opendeepwiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  minAvailable: {{ .Values.pdb.frontend.minAvailable }}
  selector:
    matchLabels:
      {{- include "opendeepwiki.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
{{- end }}
