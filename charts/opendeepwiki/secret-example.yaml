# OpenDeepWiki 敏感信息配置示例
#
# 使用方法：
#   cp secret-example.yaml secret.yaml
#   编辑 secret.yaml 替换为实际值
#   kubectl apply -f secret.yaml -n <namespace>
#
# 然后在 values.yaml 中引用：
#   backend:
#     secrets:
#       - name: CHAT_API_KEY
#         secretName: opendeepwiki-secrets
#         key: chat-api-key

apiVersion: v1
kind: Secret
metadata:
  name: opendeepwiki-secrets
  namespace: default
type: Opaque
stringData:
  # ==========================================
  # 必需配置
  # ==========================================

  # AI API 密钥 - 所有 AI 功能的全局回退密钥
  chat-api-key: "your-api-key-here"

  # JWT 签名密钥 - 至少32字符
  # 生成: openssl rand -base64 32
  jwt-secret-key: "your-jwt-secret-key-minimum-32-characters"

  # ==========================================
  # Wiki 生成器专用密钥（可选）
  # 不配置则自动使用 chat-api-key
  # ==========================================
  # wiki-catalog-api-key: ""
  # wiki-content-api-key: ""
  # wiki-translation-api-key: ""

  # ==========================================
  # MCP OAuth（启用 Google 登录时需要）
  # ==========================================
  # google-client-id: ""
  # google-client-secret: ""

  # ==========================================
  # GitHub App（用于仓库批量导入）
  # ==========================================
  # github-app-id: ""
  # github-app-private-key: |
  #   -----BEGIN RSA PRIVATE KEY-----
  #   ...
  #   -----END RSA PRIVATE KEY-----

  # ==========================================
  # Git 平台 API Token
  # ==========================================
  # github-token: ""
  # gitee-token: ""
  # gitlab-token: ""

  # ==========================================
  # Chat 提供商密钥
  # ==========================================
  # feishu-app-secret: ""
  # slack-bot-token: ""
  # qq-app-secret: ""
  # wechat-app-secret: ""