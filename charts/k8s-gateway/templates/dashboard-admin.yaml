{{- if .Values.dashboard.enabled }}
# Dashboard 管理员账号 + 长期 Token
# 必须与 Dashboard 部署在同一 namespace（{{ .Values.dashboard.namespace }}）
# 必须修改 Dashboard Deployment 使用此 ServiceAccount
# 命令：kubectl patch deployment kubernetes-dashboard -n {{ .Values.dashboard.namespace }} \
#        -p '{"spec":{"template":{"spec":{"serviceAccountName":"{{ .Values.dashboard.serviceAccount.name }}"}}}}'
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.dashboard.serviceAccount.name }}
  namespace: {{ .Values.dashboard.namespace }}
  labels:
    {{- include "k8s-gateway.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.dashboard.serviceAccount.name }}
  labels:
    {{- include "k8s-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: {{ .Values.dashboard.serviceAccount.name }}
  namespace: {{ .Values.dashboard.namespace }}
{{- if .Values.dashboard.longLivedToken }}
---
# 长期 Token Secret（K8s 1.24+ 需手动创建）
# Token 不会自动过期，适合本地开发环境
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.dashboard.serviceAccount.name }}-token
  namespace: {{ .Values.dashboard.namespace }}
  annotations:
    kubernetes.io/service-account.name: {{ .Values.dashboard.serviceAccount.name }}
  labels:
    {{- include "k8s-gateway.labels" . | nindent 4 }}
type: kubernetes.io/service-account-token
{{- end }}
{{- end }}