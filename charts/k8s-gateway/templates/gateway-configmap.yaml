{{- if .Values.gateway.enabled }}
# Gateway HTML ConfigMap（自动从 html/ 目录读取）
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-html
  namespace: {{ .Values.gateway.namespace }}
  labels:
    {{- include "k8s-gateway.labels" . | nindent 4 }}
data:
  {{- (.Files.Glob "html/**").AsConfig | nindent 2 }}
{{- end }}