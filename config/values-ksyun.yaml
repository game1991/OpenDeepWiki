# OpenDeepWiki 自定义配置 - 金山云星源平台
# 使用方式: helm upgrade opendeepwiki ./charts/opendeepwiki -f values-ksyun.yaml

# ==========================================
# 后端服务配置
# ==========================================
backend:
  replicaCount: 1

  # AI 配置 - 金山云星源平台 kimi-k2.5
  environment:
    ASPNETCORE_ENVIRONMENT: Production
    URLS: http://+:8080
    # 数据库配置
    Database__Type: sqlite
    ConnectionStrings__Default: Data Source=/data/opendeepwiki.db
    REPOSITORIES_DIRECTORY: /data
    # AI 端点配置 - 金山云星源平台
    ENDPOINT: https://kspmas.ksyun.com/v1
    CHAT_REQUEST_TYPE: OpenAI
    CHAT_REQUEST_MODEL_ID: kimi-k2.5
    WIKI_CATALOG_MODEL: kimi-k2.5
    WIKI_CATALOG_ENDPOINT: https://kspmas.ksyun.com/v1
    WIKI_CATALOG_REQUEST_TYPE: OpenAI
    WIKI_CONTENT_MODEL: kimi-k2.5
    WIKI_CONTENT_ENDPOINT: https://kspmas.ksyun.com/v1
    WIKI_CONTENT_REQUEST_TYPE: OpenAI
    # Embedding 配置
    EMBEDDING_MODEL_ID: text-embedding-3-small
    # 其他配置
    WIKI_PARALLEL_COUNT: "5"
    WIKI_LANGUAGES: "en,zh"

  # 敏感信息从 Secret 引用
  secrets:
    - name: CHAT_API_KEY
      secretName: opendeepwiki-secrets
      key: chat-api-key
    - name: CATALOG_API_KEY
      secretName: opendeepwiki-secrets
      key: catalog-api-key
    - name: CONTENT_API_KEY
      secretName: opendeepwiki-secrets
      key: content-api-key
    - name: JWT_SECRET
      secretName: opendeepwiki-secrets
      key: jwt-secret

  # 持久化存储
  persistence:
    enabled: true
    storageClass: "local-path"
    size: 10Gi
    accessMode: ReadWriteOnce

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

# ==========================================
# 前端服务配置
# ==========================================
frontend:
  replicaCount: 1

  environment:
    NODE_ENV: production
    API_PROXY_URL: http://opendeepwiki-backend:8080

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# ==========================================
# Ingress 配置
# ==========================================
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: local.wiki.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
  tls: []

# ==========================================
# 数据库配置（禁用，使用 SQLite）
# ==========================================
mysql:
  enabled: false

postgresql:
  enabled: false

# ==========================================
# 其他配置
# ==========================================
autoscaling:
  enabled: false

pdb:
  enabled: false

serviceAccount:
  create: true
