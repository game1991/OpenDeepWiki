# OpenDeepWiki k3s 环境配置
# 使用: helm upgrade --install opendeepwiki ./charts/opendeepwiki -f config/values-k3s.yaml

# ==========================================
# 后端服务配置
# ==========================================
backend:
  replicaCount: 1

  image:
    repository: ${DOCKER_HUB_USERNAME}/opendeepwiki-backend-fixed
    tag: latest
    pullPolicy: IfNotPresent

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

  persistence:
    enabled: true
    storageClass: "local-path"
    size: 10Gi
    accessMode: ReadWriteOnce

  # 环境变量（非敏感信息）
  # AI 配置 - 金山云星源平台 kimi-k2.5
  environment:
    ASPNETCORE_ENVIRONMENT: "Production"
    URLS: "http://+:8080"
    Database__Type: "sqlite"
    ConnectionStrings__Default: "Data Source=/data/opendeepwiki.db"
    REPOSITORIES_DIRECTORY: "/data"
    # 金山云星源平台 API 端点
    ENDPOINT: "https://kspmas.ksyun.com/v1"
    CHAT_REQUEST_TYPE: "OpenAI"
    CHAT_REQUEST_MODEL_ID: "kimi-k2.5"
    CATALOG_REQUEST_MODEL_ID: "kimi-k2.5"
    CONTENT_REQUEST_MODEL_ID: "kimi-k2.5"
    WIKI_CATALOG_MODEL: "kimi-k2.5"
    WIKI_CATALOG_ENDPOINT: "https://kspmas.ksyun.com/v1"
    WIKI_CATALOG_REQUEST_TYPE: "OpenAI"
    WIKI_CONTENT_MODEL: "kimi-k2.5"
    WIKI_CONTENT_ENDPOINT: "https://kspmas.ksyun.com/v1"
    WIKI_CONTENT_REQUEST_TYPE: "OpenAI"
    EMBEDDING_MODEL_ID: "text-embedding-3-small"
    WIKI_PARALLEL_COUNT: "5"
    WIKI_LANGUAGES: "en,zh"
    # 翻译配置 - 使用金山云星源平台
    WIKI_TRANSLATION_MODEL: "kimi-k2.5"
    WIKI_TRANSLATION_ENDPOINT: "https://kspmas.ksyun.com/v1"
    WIKI_TRANSLATION_REQUEST_TYPE: "OpenAI"
    # k3s 中 Pod 可以直接访问 WSL2 网络，不需要代理
    # HTTP_PROXY: ""
    # HTTPS_PROXY: ""
    # NO_PROXY: ""

  # 敏感信息通过 Secret 注入
  secrets:
    - name: CHAT_API_KEY
      secretName: opendeepwiki-secrets
      key: chat-api-key
    - name: CATALOG_API_KEY
      secretName: opendeepwiki-secrets
      key: catalog-api-key
    - name: CONTENT_API_KEY
      secretName: opendeepwiki-secrets
      key: content-api-key
    - name: WIKI_TRANSLATION_API_KEY
      secretName: opendeepwiki-secrets
      key: chat-api-key
    - name: JWT_SECRET
      secretName: opendeepwiki-secrets
      key: jwt-secret

# ==========================================
# 前端服务配置
# ==========================================
frontend:
  replicaCount: 1

  image:
    repository: ${DOCKER_HUB_USERNAME}/opendeepwiki-web
    tag: latest
    pullPolicy: IfNotPresent

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  environment:
    NODE_ENV: "production"
    # k3s 中使用 Service DNS 访问后端
    API_PROXY_URL: "http://opendeepwiki-backend:8080"

# ==========================================
# Service 配置
# ==========================================
service:
  backend:
    type: ClusterIP
    port: 8080
  frontend:
    type: ClusterIP
    port: 3000

# ==========================================
# Ingress 配置
# ==========================================
ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: opendeepwiki-wiki-limits@kubernetescrd
  hosts:
    - host: local.wiki.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend

# ==========================================
# 关闭生产功能
# ==========================================
autoscaling:
  enabled: false

pdb:
  enabled: false

serviceAccount:
  create: true
