# OpenDeepWiki k3s 本地开发配置
#
# 使用方法:
#   1. 创建 Secret: bash scripts/create-opendeepwiki-secret.sh
#   2. 部署: helm upgrade --install opendeepwiki ./charts/opendeepwiki -f config/values-k3s.yaml

# ==========================================
# 后端服务配置
# ==========================================
backend:
  replicaCount: 1

  image:
    repository: ${DOCKER_HUB_USERNAME}/opendeepwiki-backend
    tag: latest
    pullPolicy: IfNotPresent

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

  persistence:
    enabled: true
    storageClass: "local-path"
    size: 10Gi
    accessMode: ReadWriteOnce

  environment:
    # --- ASP.NET Core ---
    ASPNETCORE_ENVIRONMENT: "Production"
    ASPNETCORE_HTTP_PORTS: "8080"
    # --- 数据库 ---
    Database__Type: "sqlite"
    ConnectionStrings__Default: "Data Source=/data/opendeepwiki.db"
    # --- 仓库存储 ---
    REPOSITORIES_DIRECTORY: "/data"
    # --- AI 核心配置 - 金山云星源 kimi-k2.5 ---
    ENDPOINT: "https://kspmas.ksyun.com/v1"
    CHAT_REQUEST_TYPE: "OpenAI"
    # --- Wiki 目录生成 ---
    WIKI_CATALOG_MODEL: "kimi-k2.5"
    WIKI_CATALOG_ENDPOINT: "https://kspmas.ksyun.com/v1"
    WIKI_CATALOG_REQUEST_TYPE: "OpenAI"
    # --- Wiki 内容生成 ---
    WIKI_CONTENT_MODEL: "kimi-k2.5"
    WIKI_CONTENT_ENDPOINT: "https://kspmas.ksyun.com/v1"
    WIKI_CONTENT_REQUEST_TYPE: "OpenAI"
    # --- Wiki 翻译 ---
    WIKI_TRANSLATION_MODEL: "kimi-k2.5"
    WIKI_TRANSLATION_ENDPOINT: "https://kspmas.ksyun.com/v1"
    WIKI_TRANSLATION_REQUEST_TYPE: "OpenAI"
    # --- Wiki 生成参数 ---
    WIKI_PARALLEL_COUNT: "5"
    WIKI_LANGUAGES: "en,zh"
    WIKI_MAX_OUTPUT_TOKENS: "32000"
    WIKI_DOCUMENT_GENERATION_TIMEOUT_MINUTES: "60"
    WIKI_TRANSLATION_TIMEOUT_MINUTES: "45"
    WIKI_TITLE_TRANSLATION_TIMEOUT_MINUTES: "2"
    WIKI_README_MAX_LENGTH: "4000"
    WIKI_DIRECTORY_TREE_MAX_DEPTH: "2"
    WIKI_MAX_RETRY_ATTEMPTS: "3"
    WIKI_RETRY_DELAY_MS: "1000"
    # --- MCP ---
    MCP_ENABLED: "true"
    ASPNETCORE_CORS_ORIGINS: ""

  secrets:
    - name: CHAT_API_KEY
      secretName: opendeepwiki-secrets
      key: chat-api-key
    - name: JWT_SECRET_KEY
      secretName: opendeepwiki-secrets
      key: jwt-secret-key
    # 通过 ASP.NET Core 标准配置层级覆盖 Jwt:SecretKey
    - name: Jwt__SecretKey
      secretName: opendeepwiki-secrets
      key: jwt-secret-key

# ==========================================
# 前端服务配置
# ==========================================
frontend:
  replicaCount: 1

  image:
    repository: ${DOCKER_HUB_USERNAME}/opendeepwiki-frontend
    tag: latest
    pullPolicy: IfNotPresent

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  environment:
    NODE_ENV: "production"
    API_PROXY_URL: "http://opendeepwiki-backend:8080"

# ==========================================
# Service / Ingress
# ==========================================
service:
  backend:
    type: ClusterIP
    port: 8080
  frontend:
    type: ClusterIP
    port: 3000

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
  hosts:
    - host: local.wiki.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend

autoscaling:
  enabled: false

pdb:
  enabled: false

serviceAccount:
  create: true