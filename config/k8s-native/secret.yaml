apiVersion: v1
kind: Secret
metadata:
  name: opendeepwiki-secrets
  namespace: opendeepwiki
type: Opaque
stringData:
  # 请替换为实际的 API 密钥
  chat-api-key: "sk-your-openai-api-key"
  catalog-api-key: "sk-your-catalog-api-key"
  content-api-key: "sk-your-content-api-key"
  jwt-secret: "your-jwt-secret-key-min-32-characters-long"
---
apiVersion: v1
kind: Secret
metadata:
  name: opendeepwiki-tls
  namespace: opendeepwiki
type: kubernetes.io/tls
data:
  # 请使用 cert-manager 或手动生成证书
  # tls.crt: <base64-encoded-cert>
  # tls.key: <base64-encoded-key>
