# OpenDeepWiki 测试/预发布环境 Helm 配置

# 后端服务 - 测试环境
backend:
  replicaCount: 2

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

  persistence:
    enabled: true
    storageClass: "local-path"
    size: 30Gi

  environment:
    ASPNETCORE_ENVIRONMENT: Production
    URLS: http://+:8080
    Database__Type: mysql  # 测试环境使用 MySQL
    ConnectionStrings__Default: >
      Server=opendeepwiki-mysql-primary;
      Port=3306;
      Database=opendeepwiki;
      User Id=opendeepwiki;
      Charset=utf8mb4;
    REPOSITORIES_DIRECTORY: /data
    ENDPOINT: https://api.openai.com/v1
    CHAT_REQUEST_TYPE: OpenAI
    WIKI_CATALOG_MODEL: gpt-4o
    WIKI_CATALOG_ENDPOINT: https://api.openai.com/v1
    WIKI_CATALOG_REQUEST_TYPE: OpenAI
    WIKI_CONTENT_MODEL: gpt-4o
    WIKI_CONTENT_ENDPOINT: https://api.openai.com/v1
    WIKI_CONTENT_REQUEST_TYPE: OpenAI
    WIKI_PARALLEL_COUNT: "5"
    WIKI_LANGUAGES: "en,zh"

  secrets:
    - name: CHAT_API_KEY
      secretName: opendeepwiki-secrets
      key: chat-api-key
    - name: WIKI_CATALOG_API_KEY
      secretName: opendeepwiki-secrets
      key: catalog-api-key
    - name: WIKI_CONTENT_API_KEY
      secretName: opendeepwiki-secrets
      key: content-api-key
    - name: JWT_SECRET_KEY
      secretName: opendeepwiki-secrets
      key: jwt-secret

  initContainers:
    - name: wait-for-mysql
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          until nc -z opendeepwiki-mysql-primary 3306; do
            echo "Waiting for MySQL to be ready..."
            sleep 2
          done
          echo "MySQL is ready!"

# 前端服务 - 测试环境
frontend:
  replicaCount: 2

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# MySQL 配置 - 测试环境
mysql:
  enabled: true
  architecture: standalone
  auth:
    rootPassword: "staging-root-pass"
    username: opendeepwiki
    password: "staging-user-pass"
    database: opendeepwiki
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: "local-path"
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"

# Ingress 配置
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: wiki-staging.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend

# 测试环境启用 HPA
autoscaling:
  enabled: true
  backend:
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  frontend:
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# 测试环境启用 PDB
pdb:
  enabled: true
  backend:
    minAvailable: 1
  frontend:
    minAvailable: 1
