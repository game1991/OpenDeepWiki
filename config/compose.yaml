# OpenDeepWiki Docker Compose 生产环境配置
version: "3.8"

services:
  opendeepwiki:
    image: crpi-j9ha7sxwhatgtvj4.cn-shenzhen.personal.cr.aliyuncs.com/open-deepwiki/opendeepwiki:latest
    container_name: opendeepwiki-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # 基础配置
      ASPNETCORE_ENVIRONMENT: Production
      URLS: http://+:8080

      # 数据库配置（SQLite）
      Database__Type: sqlite
      ConnectionStrings__Default: Data Source=/data/opendeepwiki.db
      REPOSITORIES_DIRECTORY: /data

      # AI 配置（请从环境变量文件读取）
      CHAT_API_KEY: ${CHAT_API_KEY}
      ENDPOINT: ${ENDPOINT:-https://api.openai.com/v1}
      CHAT_REQUEST_TYPE: ${CHAT_REQUEST_TYPE:-OpenAI}

      WIKI_CATALOG_MODEL: ${WIKI_CATALOG_MODEL:-gpt-4o-mini}
      WIKI_CATALOG_ENDPOINT: ${WIKI_CATALOG_ENDPOINT:-https://api.openai.com/v1}
      WIKI_CATALOG_API_KEY: ${WIKI_CATALOG_API_KEY}
      WIKI_CATALOG_REQUEST_TYPE: ${WIKI_CATALOG_REQUEST_TYPE:-OpenAI}

      WIKI_CONTENT_MODEL: ${WIKI_CONTENT_MODEL:-gpt-4o}
      WIKI_CONTENT_ENDPOINT: ${WIKI_CONTENT_ENDPOINT:-https://api.openai.com/v1}
      WIKI_CONTENT_API_KEY: ${WIKI_CONTENT_API_KEY}
      WIKI_CONTENT_REQUEST_TYPE: ${WIKI_CONTENT_REQUEST_TYPE:-OpenAI}

      WIKI_PARALLEL_COUNT: ${WIKI_PARALLEL_COUNT:-5}
      WIKI_LANGUAGES: ${WIKI_LANGUAGES:-en,zh}

      # JWT 密钥（生产环境必须修改）
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

    volumes:
      - ./data:/data

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    networks:
      - opendeepwiki-network

  web:
    image: crpi-j9ha7sxwhatgtvj4.cn-shenzhen.personal.cr.aliyuncs.com/open-deepwiki/opendeepwiki-web:latest
    container_name: opendeepwiki-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_PROXY_URL: http://opendeepwiki:8080

    depends_on:
      opendeepwiki:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

    networks:
      - opendeepwiki-network

  # 可选：使用 MySQL 替代 SQLite
  # 取消注释以下部分启用 MySQL
  # mysql:
  #   image: mysql:8.0
  #   container_name: opendeepwiki-mysql
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
  #     MYSQL_DATABASE: opendeepwiki
  #     MYSQL_USER: opendeepwiki
  #     MYSQL_PASSWORD: ${MYSQL_PASSWORD}
  #   volumes:
  #     - ./mysql-data:/var/lib/mysql
  #   ports:
  #     - "3306:3306"
  #   command: >
  #     --character-set-server=utf8mb4
  #     --collation-server=utf8mb4_unicode_ci
  #   networks:
  #     - opendeepwiki-network

networks:
  opendeepwiki-network:
    driver: bridge
